name: Snake Animation

on:
  # run automatically every 24 hours
  schedule:
    - cron: "0 */24 * * *" 
  
  # allows to manually run the job at any time
  workflow_dispatch:
  
  # run on every push on the master branch
  push:
    branches:
    - main
    
  

jobs:
  generate:
    runs-on: macos-26
    timeout-minutes: 10
    
    steps:
      # generates a snake game from a github user (<github_user_name>) contributions graph, output a svg animation at <svg_out_path>
      - name: Snake Evolution
        # You may pin to the exact commit or the version.
        # uses: miccy/snake-evolution@42e6db66e50979a0fffbb857ed833c731f77abae
        uses: miccy/snake-evolution@v1.3.0
        with:
          # GitHub username to generate snake for
          github_user_name: intensed-dev
          # GitHub token for API access (optional, uses public scraping if not provided)
          github_token: # optional, default is 
          # Output file path(s) - SVG only while GIF support is in progress
          outputs: # optional, default is dist/snake.svg
          # Color theme (github-light, github-dark, ocean, sunset, neon-gamer, cypherpunk; glass planned with future GIF support)
          theme: # optional, default is github-dark
          # Year to generate contributions for
          year: # optional, default is 
